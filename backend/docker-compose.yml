services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120"
    ports:
      - "8000:8000"    # expose directly now
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_network

  celery_worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A core worker --loglevel=info
    depends_on:
      - redis
    networks:
      - app_network

# remove nginx service entirely
# remove staticfiles/media volume mounts (Render handles static via whitenoise or S3)

networks:
  app_network:
    driver: bridge