services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "python manage.py migrate --noinput && exec /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge