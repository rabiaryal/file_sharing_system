[databases]
# Database connection string
# Format: dbname = host=localhost port=5432 user=postgres password=secret
# This will be set via environment variables in docker-compose

[pgbouncer]
# Pool mode: session, transaction, statement
pool_mode = transaction

# Maximum number of client connections
max_client_conn = 1000

# Default pool size
default_pool_size = 25

# Minimum pool size
min_pool_size = 10

# Reserve pool size
reserve_pool_size = 5

# Reserve pool timeout
reserve_pool_timeout = 3

# Maximum idle time (seconds)
server_idle_timeout = 600

# Maximum server connection lifetime (seconds)
server_lifetime = 3600

# Maximum server connection reuse count
server_connect_timeout = 15

# Query timeout (seconds)
query_timeout = 0

# Transaction isolation
# idle_in_transaction_session_timeout = 0

# Connection pooling
# Connection age before recycling (seconds)
server_idle_timeout = 600

# Log settings
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1

# Statistics
stats_period = 60

# Authentication
# auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

# Admin console access
# admin_users = postgres
# stats_users = postgres

# Verbosity
verbose = 0
