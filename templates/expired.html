<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Link unavailable</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .card {
            max-width: 520px;
            background: rgba(15, 23, 42, 0.86);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        p {
            line-height: 1.6;
            color: #cbd5e1;
        }

        .code {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #7dd3fc;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Download link unavailable</h1>
        <p>{{ error|default:"This share link is no longer valid." }}</p>
        <span class="code">Return to Django to request a fresh link.</span>
    </main>
</body>

</html>
