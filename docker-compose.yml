services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: sh -c "python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120"
    expose:
      - 8000
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_network

  celery_worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A core worker --loglevel=info
    depends_on:
      - redis
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/usr/share/nginx/staticfiles:ro
      - ./media:/usr/share/nginx/media:ro
    depends_on:
      - web
    networks:
      - app_network

networks:
  app_network:
    driver: bridge