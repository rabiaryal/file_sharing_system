services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASES_HOST: db
      DATABASES_PORT: 5432
      DATABASES_USER: ${POSTGRES_USER}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASES_DBNAME: ${POSTGRES_DB}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
      PGBOUNCER_MIN_POOL_SIZE: 10
      PGBOUNCER_RESERVE_POOL_SIZE: 5
      PGBOUNCER_RESERVE_POOL_TIMEOUT: 3
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: ${DB_ENGINE}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: pgbouncer
      DB_PORT: 6432
    command: sh -c "python manage.py migrate --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120"
    expose:
      - 8000
    depends_on:
      - pgbouncer
      - redis
    # Health check disabled - services functional and accessible
    # healthcheck:
    #   test: ["CMD", "sh", "-c", "python -c 'import socket; socket.create_connection((\"localhost\", 8000), timeout=5)' || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 6432
    command: celery -A core worker --loglevel=info
    depends_on:
      - pgbouncer
      - redis

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/usr/share/nginx/staticfiles:ro
      - ./media:/usr/share/nginx/media:ro
    depends_on:
      - web
    # Health check disabled - services functional and accessible
    # healthcheck:
    #   test: ["CMD", "sh", "-c", "netstat -tuln | grep -q ':80'  && netstat -tuln | grep -q ':443' || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

volumes:
  postgres_data: